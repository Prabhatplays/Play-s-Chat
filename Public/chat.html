<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plays Chat</title>
  <style>
    #chat {
      border: 1px solid #ccc;
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }
    .msg { margin: 5px 0; }
    .msg span { font-weight: bold; }
  </style>
</head>
<body>
  <h1>Plays Chat</h1>
  <div id="chat"></div>
  <input type="text" id="message" placeholder="Type your message..." />
  <button id="sendBtn">Send</button>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/Login.html';

    const socket = io({ auth: { token } });

    socket.on('connect_error', (err) => {
      alert('Session expired. Please login again.');
      localStorage.removeItem('token');
      window.location.href = '/Login.html';
    });

    // NEW — when we first connect, server sends old messages
    // we display ALL of them one by one
    socket.on('load_messages', (messages) => {
      messages.forEach(({ username, text, time }) => {
        addMessage(username, text, new Date(time).toLocaleTimeString());
      });
    });

    // When anyone sends a new message, display it
    socket.on('receive_message', ({ username, text, time }) => {
      addMessage(username, text, time);
    });

    // This function adds a message to the chat box
    // We made it a function so we can reuse it in both places above
    function addMessage(username, text, time) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `<span>${username}</span> [${time}]: ${text}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // Send button click
    document.getElementById('sendBtn').onclick = () => {
      const input = document.getElementById('message');
      const text = input.value.trim();
      if (text) {
        socket.emit('send_message', text);
        input.value = '';
      }
    };

    // Enter key to send
    document.getElementById('message').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('sendBtn').click();
    });
  </script>
</body>
</html>
