<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Play's Chat</title>
  <link rel="stylesheet" href="style.css"> <!-- optional if you want styling -->
</head>
<style>
/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* Background with gradient animation */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #ff6ec4, #7873f5, #4ade80, #facc15);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}

/* Container styling */
.welcome-container {
  text-align: center;
  color: #fff;
  padding: 40px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  background: rgba(0, 0, 0, 0.3);
  box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
  animation: fadeIn 2s ease;
}

/* Title animation */
h1 {
  font-size: 2.5rem;
  margin-bottom: 15px;
  animation: slideDown 1.5s ease;
}

p {
  font-size: 1.2rem;
  margin-bottom: 30px;
  animation: fadeIn 2.5s ease;
}

/* Buttons with hover effects */
.buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.btn {
  padding: 12px 28px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(90deg, #06b6d4, #3b82f6);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
}

/* Animations */
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideDown {
  from { transform: translateY(-50px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

</style>

<body>
  <div class="welcome-container">
    <h1>🎉 Welcome to Play's Chat 🎉</h1>
    <p>Your place to connect, chat, and share in real time.</p>

    <div class="buttons">
      <a href="Public\Login.html" class="btn">Login</a>
      <a href="Public\Signup.html" class="btn">Sign Up</a>
    </div>
    <h5>The css part was done by AI kyuki css likhne mein mujhe maut ati hai</h5>
  </div>
</body>
</html>
